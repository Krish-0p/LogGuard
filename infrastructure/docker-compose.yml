version: '3.8'

services:
  # --- MESSAGING LAYER ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: infrastructure-zookeeper-1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: infrastructure-kafka-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

  # --- DATABASE LAYER ---
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: infrastructure-timescaledb-1
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=logguard
      - POSTGRES_PASSWORD=logguard
      - POSTGRES_DB=logguard
    volumes:
      - timescaledb_data:/var/lib/postgresql/data

  redis:
    image: redis:7.2-alpine
    container_name: infrastructure-redis-1
    ports:
      - "6379:6379"

  # --- SEARCH LAYER ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: infrastructure-elasticsearch-1
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # --- ML OPS LAYER ---
  minio:
    image: minio/minio
    container_name: infrastructure-minio-1
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    container_name: infrastructure-mlflow-1
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000 # Internal Docker Name
      - MLFLOW_S3_IGNORE_TLS=true
      - AWS_VIRTUAL_HOST_STYLE=false
    command: >
      sh -c "pip install boto3 && mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root s3://logguard-mlflow-artifacts/ --serve-artifacts --host 0.0.0.0"
    ports:
      - "5000:5000"
    depends_on:
      - minio
    volumes:
      - mlflow_data:/mlflow

volumes:
  timescaledb_data:
  es_data:
  mlflow_data:
  minio_data: # Persists your buckets/models