version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-1
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - mlflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: minio-1
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mlflow:
    build: .
    container_name: mlflow-1
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://mlflow:mlflow@postgres/mlflow
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
      - MLFLOW_S3_IGNORE_TLS=true
      - MLFLOW_ARTIFACT_ROOT=s3://logguard-mlflow-artifacts/
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri postgresql://mlflow:mlflow@postgres/mlflow 
      --default-artifact-root s3://logguard-mlflow-artifacts/ --serve-artifacts
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb-1
    environment:
      - POSTGRES_PASSWORD=logguard
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: redis-1
    ports:
      - "6379:6379"
volumes:
  mlflow_pgdata:
  minio_data: